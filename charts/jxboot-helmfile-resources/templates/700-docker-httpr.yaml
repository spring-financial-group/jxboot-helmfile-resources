{{- if and (index .Values "docker-registry" "enabled") (not .Values.istio.enabled) (eq "httproute" (index .Values "docker-registry" "ingressType")) }}
apiVersion: {{ .Values.gatewayApi.apiVersion | default "gateway.networking.k8s.io/v1" }}
kind: HTTPRoute
metadata:
  annotations:
{{- template "httpRouteAnnotations" (dict "Values" .Values "component" "docker-registry") }}
  name: docker-registry
spec:
  parentRefs:
{{- include "httpRouteParentRefs" . | nindent 2 }}
{{- if or (index .Values "docker-registry" "httpRoute" "customHost") .Values.jxRequirements.ingress.domain }}
  hostnames:
  - {{ include "httpRouteHostname" (dict "Values" .Values "component" "docker-registry") }}
{{- end }}
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: jenkins-x-docker-registry
      port: 5000
{{- end }}
