versions:
  # TODO update with latest builders version
  builders: latest
  # we set the versions of jx & updatebot to TESTVAL
  # in order to ensure tests are deterministic
  # (templated file content doesn't change just because new versions are released)
  jx: TESTVAL
  updatebot: TESTVAL

# TODO we want to remove exposecontroller at some point
exposer: Ingress

# imported from the global secrets?
secrets:
  tektonBucket: ""
  featureFlagAPIKey: ""
  chartMuseum:
    username: ""
    password: ""
  pipelineUser:
    username: ""
    email: ""
    token: ""

# route every exposed service via HTTPRoute instead of Ingress
chartmuseum:
  ingressType: httproute

hook:
  ingressType: httproute

# nexus also attaches an extra parentRef (appended after the default
# envoy-gateway refs) and uses a custom host + annotations.
nexus:
  ingressType: httproute
  httpRoute:
    annotations:
      team: platform
    customHost: mynexus.acme.com
    customParentRefs:
    - name: shared-gateway
      namespace: infra
      sectionName: web

docker-registry:
  enabled: true
  ingressType: httproute

jxRequirements:
  autoUpdate:
    enabled: false
    schedule: ""
  bootConfigURL: https://github.com/jenkins-x/jenkins-x-boot-config.git
  cluster:
    clusterName: mycluster
    devEnvApprovers:
    - someone
    environmentGitOwner: myorg
    environmentGitPublic: true
    gitKind: github
    gitName: github
    gitPublic: true
    gitServer: https://github.com
    kanikoFlags: "--insecure-registries"
    namespace: jx
    project: myproject
    provider: gke
    zone: europe-west1-c
  environments:
  - key: dev
    repository: environment-mycluster-dev
  - key: staging
    repository: environment-mycluster-staging
  - key: production
    repository: environment-mycluster-production
  gitops: true
  ingress:
    domain: "mydomain.com"
    externalDNS: false
    kind: httproute
    namespaceSubDomain: -jx.
    tls:
      email: ""
      enabled: true
      production: false
  repository: nexus
  secretStorage: local
  storage: []
  versionStream:
    ref: master
    url: https://github.com/jenkins-x/jenkins-x-versions.git
  webhook: lighthouse
