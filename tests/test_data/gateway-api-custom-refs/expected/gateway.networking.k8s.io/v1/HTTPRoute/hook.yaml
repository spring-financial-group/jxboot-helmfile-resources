# Source: jxboot-helmfile-resources/templates/700-hook-httpr.yaml
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: hook
spec:
  parentRefs:
  - name: my-gateway
    namespace: my-gateway-system
    sectionName: web
  hostnames:
  - hook-jx.mydomain.com
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /hook
    backendRefs:
    - name: hook
      port: 80
